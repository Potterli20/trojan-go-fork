run-type: client
local-addr: 127.0.0.1
local-port: 1080
remote-addr: your_server
remote-port: 443
password:
    - your_password
ssl:
    sni: your-domain-name.com
    server-name: ""
    verify: true
    fingerprint: chrome
    alpn:
        - http/1.1
websocket:
    enabled: true
    path: /your-websocket-path
    host: your-domain-name.com
    headers:
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36
        Accept-Language: zh-CN,zh;q=0.9,en;q=0.8
mux:
    enabled: true
router:
    enabled: true
    bypass: ['geoip:cn', 'geoip:private', 'geosite:cn', 'geosite:private']
    block: ['geosite:category-ads']
    proxy: ['geosite:geolocation-!cn']
    default_policy: proxy
    geoip: /usr/share/trojan-go-fork/geoip.dat
    geosite: /usr/share/trojan-go-fork/geosite.dat
